<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Registration | SpinMaster Table Tennis Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;430&family=Poppins:wght@500;540;580&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-wrapper">
    <!-- Theme & RTL Toggles -->
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 0.5rem; align-items: center; z-index: 2000;">
        <button id="rtl-toggle" class="btn btn-outline"
            style="padding: 0.5rem 1rem; font-size: 0.8rem;">RTL</button>
        <button id="theme-toggle" class="toggle-btn" title="Toggle Theme">
            <i data-lucide="moon"></i>
        </button>
    </div>

    <div class="auth-card" style="max-width: 500px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50" style="height: 40px; width: auto; max-width: 180px;">
                    <g transform="translate(6, 4)">
                        <rect x="13" y="24" width="5" height="13" rx="1.5" fill="#F4A261" />
                        <circle cx="15.5" cy="15.5" r="11.5" fill="#E63946" />
                        <circle cx="15.5" cy="15.5" r="10" fill="none" stroke="#F8FAFC" stroke-width="1" opacity="0.9" />
                        <circle cx="27.5" cy="24" r="4.2" fill="#F4A261" stroke="#FFFFFF" stroke-width="0.8" />
                        <path d="M 28 17 A 9 9 0 0 1 33 21" stroke="#F4A261" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8" />
                    </g>
                    <text x="50" y="24" font-family="'Poppins', sans-serif" font-weight="700" font-size="14" fill="var(--text)" letter-spacing="0.5">SPINMASTER</text>
                    <text x="50" y="38" font-family="'Poppins', sans-serif" font-weight="500" font-size="10" fill="#F4A261" letter-spacing="1">TT ACADEMY</text>
                </svg>
            </a>
            <h2 style="margin-top: 1rem;">Create Account</h2>
            <p style="color: var(--text-muted);">Join the SpinMaster Academy Community.</p>
        </div>

        <form action="index.html">
            <div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" class="form-control" style="width: 100%; height: 56px;" placeholder="Jane" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" class="form-control" style="width: 100%; height: 56px;" placeholder="Doe" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-control" style="width: 100%; height: 56px;" placeholder="jane@example.com" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" class="form-control" style="width: 100%; height: 56px; padding-right: 3rem;" placeholder="Min. 8 characters" required>
                    <i data-lucide="eye" size="18" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div style="position: relative;">
                    <input type="password" class="form-control" style="width: 100%; height: 56px; padding-right: 3rem;" placeholder="Confirm password" required>
                    <i data-lucide="eye" size="18" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Coaching Program Interest</label>
                <select class="form-control" style="width: 100%; height: 56px;">
                    <option>Beginner Coaching</option>
                    <option>Junior Development Program</option>
                    <option>Advanced Tactics Training</option>
                    <option>Adult Recreational League</option>
                </select>
            </div>
            
            <div class="form-group" style="display: flex; align-items: flex-start; gap: 0.5rem; margin-top: 1rem;">
                <input type="checkbox" id="terms" style="margin-top: 0.3rem;" required>
                <label for="terms" style="margin-bottom: 0; font-size: 0.85rem; font-weight: 400; color: var(--text-muted);">
                    I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>.
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 56px; margin-top: 1rem;">Create Account</button>
            
            <div style="text-align: center; margin: 1.5rem 0; color: var(--text-muted); position: relative;">
                <span style="background: var(--surface); padding: 0 1rem; position: relative; z-index: 1;">OR</span>
                <hr style="position: absolute; top: 50%; width: 100%; border: 0; border-top: 1px solid var(--border); margin: 0;">
            </div>

            <div style="display: flex; gap: 0.75rem;">
                <button type="button" class="btn btn-outline" style="flex: 1; height: 56px; border-color: var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 0.5rem;" title="Sign up with Google">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083L43.611,20.083L42,20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                </button>
                <button type="button" class="btn btn-outline" style="flex: 1; height: 56px; border-color: var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 0.5rem;" title="Sign up with Apple">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.1.09 2.23-.58 2.95-1.39z"/></svg>
                </button>
                <button type="button" class="btn btn-outline" style="flex: 1; height: 56px; border-color: var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 0.5rem;" title="Sign up with Facebook">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#1877F2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </button>
            </div>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 700;">Login</a>
        </p>
    </div>

    <script>
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            const icon = document.querySelector('#theme-toggle i');
            if (icon) icon.setAttribute('data-lucide', theme === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function applyRTL(dir) {
            document.documentElement.dir = dir;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const themeToggle = document.getElementById('theme-toggle');
            const rtlToggle = document.getElementById('rtl-toggle');

            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedRTL = localStorage.getItem('rtl') || 'ltr';
            applyTheme(savedTheme);
            applyRTL(savedRTL);

            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const current = document.body.getAttribute('data-theme') || 'light';
                    const next = current === 'dark' ? 'light' : 'dark';
                    localStorage.setItem('theme', next);
                    applyTheme(next);
                });
            }

            if (rtlToggle) {
                rtlToggle.addEventListener('click', () => {
                    const current = document.documentElement.dir || 'ltr';
                    const next = current === 'rtl' ? 'ltr' : 'rtl';
                    localStorage.setItem('rtl', next);
                    applyRTL(next);
                });
            }
        });
    </script>
</body>
</html>
